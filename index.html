<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Birthday Wishes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B8B;
            --secondary: #6C63FF;
            --accent: #FFD166;
            --light: #FFF9F0;
            --dark: #333333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Styles */
        .header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        .birthday-title {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            animation: float 3s ease-in-out infinite;
        }

        .birthday-person {
            font-size: 2.5rem;
            color: var(--secondary);
            font-weight: 600;
            background: var(--light);
            display: inline-block;
            padding: 10px 40px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.2);
            margin-top: 10px;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .birthday-person:hover {
            transform: rotateY(10deg) rotateX(5deg);
        }

        /* Main Card */
        .wish-card {
            background-color: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            margin: 30px auto;
            max-width: 800px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .wish-card:hover {
            transform: translateY(-10px);
        }

        .wish-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        /* Message Styles */
        .message-container {
            margin: 30px 0;
            padding: 30px;
            background: linear-gradient(135deg, #FFFBFF 0%, #FFF5F5 100%);
            border-radius: 20px;
            border-left: 8px solid var(--primary);
            position: relative;
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #555;
            font-weight: 300;
        }

        .quote-icon {
            color: var(--accent);
            font-size: 2.5rem;
            position: absolute;
        }

        .quote-left {
            top: 15px;
            left: 15px;
        }

        .quote-right {
            bottom: 15px;
            right: 15px;
            transform: rotate(180deg);
        }

        /* Interactive Elements */
        .interactive-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
            justify-content: center;
        }

        .interactive-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.3);
        }

        .interactive-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.4);
        }

        .interactive-btn:active {
            transform: translateY(0);
        }

        /* Surprise Message */
        .surprise-container {
            background: linear-gradient(135deg, var(--accent), #FFB347);
            border-radius: 20px;
            padding: 30px;
            margin: 40px 0;
            text-align: center;
            display: none;
            animation: fadeIn 1s ease;
        }

        .surprise-message {
            font-size: 1.5rem;
            color: white;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Celebration Effects */
        .celebration {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            opacity: 0;
        }

        /* Custom Wish Form */
        .custom-wish-form {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            display: none;
        }

        .form-title {
            color: var(--secondary);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .form-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: #777;
            border-top: 1px dashed #ddd;
        }

        .heart {
            color: var(--primary);
            animation: heartbeat 1.5s infinite;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Sparkle Effect */
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .birthday-title {
                font-size: 3rem;
            }
            
            .birthday-person {
                font-size: 2rem;
                padding: 10px 30px;
            }
            
            .wish-card {
                padding: 25px;
            }
            
            .message {
                font-size: 1.1rem;
            }
            
            .interactive-section {
                flex-direction: column;
                align-items: center;
            }
            
            .interactive-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1 class="birthday-title">Happy Birthday</h1>
            <div class="birthday-person" id="birthdayName"MINE EVERYTHING</div>
            <p style="margin-top: 20px; font-size: 1.2rem; color: #666;">Today is all about you. Wishing you the most wonderful day!</p>
        </header>

        <!-- Main Wish Card -->
        <main class="wish-card">
            <div class="message-container">
                <i class="fas fa-quote-left quote-icon quote-left"></i>
                <p class="message" id="birthdayMessage">
                   HAPPY BIRTHDAY MERI JAWN MAY YOU ALLAH LIVE LONG 😊💗
                </p>
                <i class="fas fa-quote-right quote-icon quote-right"></i>
            </div>

            <!-- Interactive Buttons -->
            <div class="interactive-section">
                <button class="interactive-btn" id="surpriseBtn">
                    <i class="fas fa-gift"></i> Birthday Surprise
                </button>
                <button class="interactive-btn" id="wishBtn">
                    <i class="fas fa-heart"></i> Send a Virtual Hug
                </button>
                <button class="interactive-btn" id="customWishBtn">
                    <i class="fas fa-pen"></i> Write Your Own Wish
                </button>
            </div>

            <!-- Surprise Message -->
            <div class="surprise-container" id="surpriseContainer">
                <p class="surprise-message" id="surpriseMessage"></p>
                <button class="interactive-btn" id="closeSurpriseBtn">
                    <i class="fas fa-times"></i> Close
                </button>
            </div>

            <!-- Custom Wish Form -->
            <div class="custom-wish-form" id="customWishForm">
                <h3 class="form-title">Create Your Birthday Wish</h3>
                <input type="text" class="form-input" id="senderName" placeholder="AWAIS XD">
                <textarea class="form-input form-textarea" id="customMessage" placeholder="Write your personal birthday message here..."></textarea>
                <div style="display: flex; gap: 15px;">
                    <button class="interactive-btn" id="submitCustomWishBtn">
                        <i class="fas fa-paper-plane"></i> Submit Wish
                    </button>
                    <button class="interactive-btn" style="background: #777;" id="cancelCustomWishBtn">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>MADE WITH <span class="heart"><i class="fas fa-heart"></i></span> AWAIS XD</p>
            <p style="margin-top: 10px;">© <span id="currentYear"></span> Birthday Wish codes by M Awais</p>
        </footer>
    </div>

    <script>
        // Set current year in footer
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // Birthday person names to cycle through
        const birthdayNames = ['HAMI⁴⁶'];
        let currentNameIndex = 0;

        // Birthday messages database
        const birthdayMessages = [
            "May your birthday be filled with sunshine, smiles, laughter, and love. Wishing you everything happy on your special day!",
            "On your birthday, I wish you success and endless happiness. May you have a fantastic day and many more to come!",
            "Another year older, another year wiser, another year more amazing! Hope your birthday is as incredible as you are.",
            "Sending you smiles for every moment of your special day. Have a wonderful time and a very happy birthday!",
            "Hope your birthday is as sweet as cake, as bright as candles, and as happy as the smile on your face. Enjoy your day!",
            "May your birthday be the start of a year filled with good luck, good health, and much happiness. Cheers to you!"
        ];

        // Surprise messages
        const surpriseMessages = [
            "😊 Happy Birthday 🎉! Wishing you a day filled with love, laughter, and all your favorite things 💖!",
            "😊 Happy Birthday 🍰! Here's to another year of laughter, love, and making unforgettable memories 💕!",
            "😊 Happy Birthday 🎂! May all your dreams and wishes come true 🌟!",
            "😊 Happy Birthday 🎉! Wishes for a year filled with joy, love, and adventure 💫!",
            "😊 Happy Birthday! 🎉 May your day be as awesome as you are 💖!"
        ];

        // Elements
        const birthdayNameElement = document.getElementById('birthdayName');
        const birthdayMessageElement = document.getElementById('birthdayMessage');
        const surpriseBtn = document.getElementById('surpriseBtn');
        const wishBtn = document.getElementById('wishBtn');
        const customWishBtn = document.getElementById('customWishBtn');
        const surpriseContainer = document.getElementById('surpriseContainer');
        const surpriseMessageElement = document.getElementById('surpriseMessage');
        const closeSurpriseBtn = document.getElementById('closeSurpriseBtn');
        const customWishForm = document.getElementById('customWishForm');
        const submitCustomWishBtn = document.getElementById('submitCustomWishBtn');
        const cancelCustomWishBtn = document.getElementById('cancelCustomWishBtn');
        const senderNameInput = document.getElementById('senderName');
        const customMessageInput = document.getElementById('customMessage');

        // Change birthday person name every 8 seconds
        function changeBirthdayName() {
            currentNameIndex = (currentNameIndex + 1) % birthdayNames.length;
            birthdayNameElement.textContent = birthdayNames[currentNameIndex];
            
            // Also change the message when name changes
            const randomMessageIndex = Math.floor(Math.random() * birthdayMessages.length);
            birthdayMessageElement.textContent = birthdayMessages[randomMessageIndex];
            
            // Add a sparkle effect
            createSparkleEffect();
        }

        // Create sparkle effect
        function createSparkleEffect() {
            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                
                // Random position around the name
                const nameRect = birthdayNameElement.getBoundingClientRect();
                const x = nameRect.left + Math.random() * nameRect.width;
                const y = nameRect.top + Math.random() * nameRect.height;
                
                sparkle.style.left = x + 'px';
                sparkle.style.top = y + 'px';
                sparkle.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
                sparkle.style.width = `${Math.random() * 15 + 5}px`;
                sparkle.style.height = sparkle.style.width;
                
                document.body.appendChild(sparkle);
                
                // Animate sparkle
                sparkle.animate([
                    { opacity: 0, transform: 'scale(0)' },
                    { opacity: 1, transform: 'scale(1)' },
                    { opacity: 0, transform: 'scale(0)' }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'ease-out'
                });
                
                // Remove after animation
                setTimeout(() => sparkle.remove(), 2000);
            }
        }

        // Birthday surprise button
        surpriseBtn.addEventListener('click', function() {
            // Get random surprise message
            const randomIndex = Math.floor(Math.random() * surpriseMessages.length);
            surpriseMessageElement.textContent = surpriseMessages[randomIndex];
            
            // Show surprise container
            surpriseContainer.style.display = 'block';
            
            // Create celebration effect
            createCelebrationEffect();
            
            // Play a subtle sound (using Web Audio API)
            playCelebrationSound();
        });

        // Close surprise button
        closeSurpriseBtn.addEventListener('click', function() {
            surpriseContainer.style.display = 'none';
        });

        // Send virtual hug button
        wishBtn.addEventListener('click', function() {
            // Change button text temporarily
            const originalText = wishBtn.innerHTML;
            wishBtn.innerHTML = '<i class="fas fa-heart"></i> Virtual Hug Sent!';
            wishBtn.style.background = 'linear-gradient(135deg, #4CAF50, #2E7D32)';
            
            // Create heart animation
            createHeartAnimation();
            
            // Reset button after 2 seconds
            setTimeout(() => {
                wishBtn.innerHTML = originalText;
                wishBtn.style.background = 'linear-gradient(135deg, var(--primary), var(--secondary))';
            }, 2000);
        });

        // Show custom wish form
        customWishBtn.addEventListener('click', function() {
            customWishForm.style.display = 'block';
            customWishForm.scrollIntoView({ behavior: 'smooth' });
        });

        // Submit custom wish
        submitCustomWishBtn.addEventListener('click', function() {
            const senderName = senderNameInput.value.trim();
            const customMessage = customMessageInput.value.trim();
            
            if (!senderName || !customMessage) {
                alert('Please enter both your name and a message');
                return;
            }
            
            // Update the main birthday message with the custom one
            birthdayMessageElement.textContent = customMessage;
            
            // Show a confirmation
            alert(`Thank you, ${senderName}! Your birthday wish has been added.`);
            
            // Reset form and hide it
            senderNameInput.value = '';
            customMessageInput.value = '';
            customWishForm.style.display = 'none';
            
            // Create a special effect
            createConfettiEffect();
        });

        // Cancel custom wish
        cancelCustomWishBtn.addEventListener('click', function() {
            customWishForm.style.display = 'none';
            senderNameInput.value = '';
            customMessageInput.value = '';
        });

        // Create celebration effect (confetti)
        function createCelebrationEffect() {
            const colors = ['#FF6B8B', '#6C63FF', '#FFD166', '#4CAF50', '#FF9800'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                
                // Random position at top
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-20px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = Math.random() * 15 + 5 + 'px';
                confetti.style.height = Math.random() * 15 + 5 + 'px';
                
                document.body.appendChild(confetti);
                
                // Animate confetti falling
                const animation = confetti.animate([
                    {
